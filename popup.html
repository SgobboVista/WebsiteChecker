<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 220px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 12px;
            background: #111113;
            color: #fff;
            margin: 0;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .logo { font-weight: 800; font-size: 16px; color: #8b5cf6; }
        
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #18181b;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #27272a;
        }
        
        .label { font-size: 12px; font-weight: 500; }

        /* Stylish Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3f3f46;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #8b5cf6; }
        input:checked + .slider:before { transform: translateX(14px); }

        .btn-bulk {
            width: 100%;
            margin-top: 12px;
            background: #27272a;
            color: #e4e4e7;
            border: 1px solid #3f3f46;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-bulk:hover { background: #3f3f46; border-color: #52525b; }
        
        .footer {
            margin-top: 12px;
            font-size: 9px;
            color: #52525b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">SGOVI</span>
        <span style="font-size: 10px; color: #10b981;">v31.2</span>
    </div>

    <div class="switch-container">
        <span class="label" id="text-enable">Website Checker</span>
        <label class="switch">
            <input type="checkbox" id="check-enabled" checked>
            <span class="slider"></span>
        </label>
    </div>

    <button class="btn-bulk" id="btn-scan">
        🔍 <span id="text-scan">Seite scannen</span>
    </button>

    <div class="footer">
        &copy; 2026 SgobboVista Search
    </div>

    <script src="lang.js"></script>
    <script src="popup.js"></script>
</body>
</html>
